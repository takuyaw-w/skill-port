services:
  workspace:
    build:
      context: .
      dockerfile: docker/workspace/Dockerfile
    container_name: skill-port-workspace
    working_dir: /workspace
    tty: true
    stdin_open: true
    volumes:
      -  .:/workspace
      - root-node-modules:/workspace/node_modules
      - api-node-modules:/workspace/apps/api/node_modules
      - admin-web-node-modules:/workspace/apps/admin-web/node_modules
      - employee-web-node-modules:/workspace/apps/employee-web/node_modules
      - shared-node-modules:/workspace/packages/shared/node_modules
      - contracts-node-modules:/workspace/packages/contracts/node_modules
      - pnpm-store:/pnpm/store
    env_file:
      - .env
    environment:
      TZ: Asia/Tokyo
      NPM_CONFIG_STORE_DIR: /home/node/.local/share/pnpm/store
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      NODE_ENV: development
      NUXT_HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      DATABASE_URL: postgres://postgres:postgres@db:5432/skill_port
    ports:
      - "8787:8787" # api
      - "3001:3001" # admin-web
      - "3002:3002" # employee-web
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17.5
    container_name: skill-port-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app
      TZ: Asia/Tokyo
    volumes:
      - skill-port-db-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  skill-port-db-data:
  root-node-modules:
  api-node-modules:
  admin-web-node-modules:
  employee-web-node-modules:
  shared-node-modules:
  contracts-node-modules:
  pnpm-store:
